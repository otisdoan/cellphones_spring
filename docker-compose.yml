
services:
  postgres:
    image: postgres:15
    env_file:
      - .env
    container_name: db_cellphones
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - cellphones_pg_data:/var/lib/postgresql/data

    networks:
      - backend_network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: spring_cellphones
    restart: always

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    networks:
      - backend_network

volumes:
  postgres_data:
  cellphones_pg_data:

networks:
  backend_network: